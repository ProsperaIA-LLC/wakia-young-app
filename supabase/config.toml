# Supabase project configuration
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
email.enable_confirmations = false

[functions.check-alerts]
# verify_jwt = false allows the cron scheduler to invoke without a JWT.
# The function uses the SERVICE_ROLE key internally, so it is still secure.
verify_jwt = false

# NOTE: [[crons]] is defined via SQL migration instead of config.toml
# See supabase/migrations/20260320000000_cron_check_alerts.sql
